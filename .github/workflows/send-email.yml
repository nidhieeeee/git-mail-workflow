name: Email on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch: #manual trigger

jobs:
  send-email:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    - name: Send Email via Brevo API
      run: |
        curl --request POST \
          --url https://api.brevo.com/v3/smtp/email \
          --header "accept: application/json" \
          --header "api-key:${{ secrets.BREVO_API_KEY }}" \
          --header "content-type: application/json" \
          --data '{
            "sender": {
              "name": "Git Bot",
              "email": "'"${{ secrets.FROM_EMAIL }}"'"
            },
            "to": [
              {
                "email": "'"${{ secrets.TO_EMAIL }}"'",
                "name": "Jatin"
              }
            ],
            "subject": "PR merged to main 🚀",
            "htmlContent": "<div style='margin: 0 auto; max-width: 600px; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Helvetica, Arial, sans-serif; border: 1px solid #d0d7de; border-radius: 6px; overflow: hidden; background-color: #ffffff; box-shadow: 0 1px 3px rgba(31,35,40,0.12);'>
              <div style='background-color: #f6f8fa; padding: 12px 16px; border-bottom: 1px solid #d0d7de; display: flex; align-items: center;'>
                <div style='background-color: #8250df; color: #ffffff; border-radius: 2em; padding: 4px 12px; font-size: 12px; font-weight: 600; display: inline-block; margin-right: 12px;'>
                  Merged
                </div>
                <span style='font-size: 14px; color: #57606a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;'>
                  ${{ github.repository }}
                </span>
              </div>

              <div style='padding: 16px;'>
                <div style='margin-bottom: 16px;'>
                  <h3 style='margin: 0; font-size: 18px; font-weight: 600; color: #24292f; line-height: 1.4;'>
                    ${{ github.event.pull_request.title }}
                  </h3>
                  <p style='margin: 4px 0 0 0; font-size: 14px; color: #57606a;'>
                    Pull Request <span style='color: #8250df; font-weight: 500;'>#${{ github.event.pull_request.number }}</span> was successfully merged.
                  </p>
                </div>

                <div style='border-top: 1px solid #f0f2f4; pt: 16px; padding-top: 16px;'>
                  <a href='${{ github.event.pull_request.html_url }}' style='display: inline-block; background-color: #f6f8fa; color: #24292f; border: 1px solid #d0d7de; padding: 6px 16px; font-size: 14px; font-weight: 600; border-radius: 6px; text-decoration: none; text-align: center; min-width: 100px;'>
                    View Pull Request
                  </a>
                </div>
              </div>
            </div>"
          }'